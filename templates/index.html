<!DOCTYPE html>
<html>
<body>
    <h2>Kurs-Check Live</h2>
    <form method="POST">
        <input type="text" name="ticker" placeholder="z.B. MSFT">
        <button type="submit">Abfrage</button>
    </form>
    <table border="1">
        <tr>
            <th>Ticker</th>
            <th>Preis</th>
        </tr>
        {% for s in stocks %}
        <tr>
            <td>{{ s.name }}</td>
            <td>{{ s.price }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
