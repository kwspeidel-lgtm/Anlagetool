    <table border="1">
        <tr>
            <th>Ticker</th>
            <th>Preis</th>
            <th>Abstand SMA38 (%)</th>
            <th>Abstand SMA60 (%)</th>
            <th>3-Jahre (%)</th>
        </tr>
        {% for s in stocks %}
        <tr>
            <td>{{ s.name }}</td>
            <td>{{ s.price }}</td>
            <td>{{ s.dist38 }}%</td>
            <td>{{ s.dist60 }}%</td>
            <td>{{ s.perf3y }}%</td>
        </tr>
        {% endfor %}
    </table>
